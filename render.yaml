# Render Blueprint — https://render.com/docs/blueprint-spec
# Ao conectar o repositório, o Render lê este arquivo e cria tudo automaticamente.

databases:
  - name: controle-financeiro-db
    plan: free
    databaseName: controle_financeiro
    user: cfuser

services:
  - type: web
    name: controle-financeiro-api
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: ./build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: controle-financeiro-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
