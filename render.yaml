# Render Blueprint — https://render.com/docs/blueprint-spec
# Ao conectar o repositório, o Render lê este arquivo e cria tudo automaticamente.

databases:
  - name: controle-financeiro-db
    plan: free
    databaseName: controle_financeiro
    user: cfuser

services:
  - type: web
    name: controle-financeiro-api
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: ./build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: controle-financeiro-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      # ── Obrigatório para a autenticação funcionar ──
      # URL do projeto Supabase (busca chave pública ECC automaticamente)
      - key: SUPABASE_URL
        value: "https://ejekooargkcezoynninm.supabase.co"
      # JWT Secret HS256 legado — preencher no painel do Render se necessário
      - key: SUPABASE_JWT_SECRET
        sync: false
      # ── URL do frontend em produção (ex: https://controle-financeiro.vercel.app) ──
      - key: CORS_ORIGINS
        sync: false
